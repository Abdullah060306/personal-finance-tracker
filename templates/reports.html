<!DOCTYPE html>
<html>
<head>
    <title>Reports - Finance Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; }
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .card h3 { color: #666; font-size: 0.9em; margin-bottom: 10px; }
        .card .amount { font-size: 2em; font-weight: bold; }
        .income { color: #2ecc71; }
        .expense { color: #e74c3c; }
        .savings { color: #3498db; }
        .chart-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Reports - {{ current_month }}</h1>
        <a href="/" class="btn">← Back to Home</a>
        
        <div class="cards">
            <div class="card">
                <h3>TOTAL INCOME</h3>
                <div class="amount income">₹{{ "{:,.2f}".format(month_data.income) }}</div>
            </div>
            <div class="card">
                <h3>TOTAL EXPENSES</h3>
                <div class="amount expense">₹{{ "{:,.2f}".format(month_data.expense) }}</div>
            </div>
            <div class="card">
                <h3>NET SAVINGS</h3>
                <div class="amount savings">₹{{ "{:,.2f}".format(month_data.savings) }}</div>
            </div>
        </div>
        
        <div class="chart-box">
            <canvas id="pieChart" height="100"></canvas>
        </div>
    </div>
    
    <script>
        const catData = {{ cat_data | tojson }};
        const labels = catData.map(d => d.category);
        const data = catData.map(d => d.amount);
        
        new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: [
                        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0',
                        '#9966FF', '#FF9F40', '#FF6384', '#C9CBCF'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Expense Breakdown by Category',
                        font: { size: 18 }
                    }
                }
            }
        });
    </script>
</body>
</html>
