<!DOCTYPE html>
<html>
<head>
    <title>Add Transaction - Finance Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit:hover { background: #764ba2; }
        .back {
            text-align: center;
            margin-top: 15px;
        }
        .back a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>➕ Add Transaction</h2>
        <form method="POST">
            <div class="form-group">
                <label>Type</label>
                <select name="type" id="type" onchange="updateCategories()">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" name="amount" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select name="category" id="category">
                </select>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <input type="text" name="description" required>
            </div>
            
            <button type="submit" class="btn-submit">Save Transaction</button>
        </form>
        <div class="back"><a href="/">← Back to Home</a></div>
    </div>
    
    <script>
        const categories = {
            income: {{ categories.income | tojson }},
            expense: {{ categories.expense | tojson }}
        };
        
        function updateCategories() {
            const type = document.getElementById('type').value;
            const select = document.getElementById('category');
            select.innerHTML = '';
            categories[type].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }
        
        updateCategories();
    </script>
</body>
</html>
